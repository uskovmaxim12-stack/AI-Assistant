<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИИ-ассистент · Универсальный</title>
    <!-- Transformers.js -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #1a2234 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .app {
            width: 100%;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
        .header h1 {
            color: white;
            font-weight: 600;
            font-size: 26px;
            flex: 1;
        }
        .status {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 10px #f97316;
        }
        .dot.online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        .main {
            display: flex;
            flex-direction: row;
            min-height: 650px;
        }
        .chat-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .reminder-section {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .reminder-section h2 {
            color: white;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        .message-row.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #334155, #475569);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }
        .avatar.user {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }
        .bubble {
            padding: 14px 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            max-width: 100%;
        }
        .user .bubble {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            border-bottom-left-radius: 4px;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
        }
        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%,60%,100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-area {
            padding: 20px 25px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 15px;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        #message-input {
            width: 100%;
            padding: 16px 60px 16px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        #message-input:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        #message-input::placeholder {
            color: #64748b;
        }
        #send-button {
            position: absolute;
            right: 8px;
            top: 8px;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
            transition: 0.2s;
        }
        #send-button:hover {
            transform: scale(1.05);
        }
        #send-button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        /* Напоминания */
        .reminder-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .reminder-form input, .reminder-form button {
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            outline: none;
        }
        .reminder-form input:focus {
            border-color: #6366f1;
        }
        .reminder-form button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .reminder-form button:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }
        .reminder-list {
            list-style: none;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .reminder-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .reminder-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .reminder-text {
            color: white;
            font-weight: 500;
        }
        .reminder-time {
            color: #94a3b8;
            font-size: 12px;
        }
        .delete-reminder {
            color: #ef4444;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .delete-reminder:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.3s;
        }
        #loading-text {
            color: #94a3b8;
            font-size: 14px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo"><i class="fas fa-brain"></i></div>
            <h1>Мой универсальный ИИ</h1>
            <div class="status" id="status">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">Загрузка модели...</span>
            </div>
        </div>
        <div class="main">
            <div class="chat-section">
                <div id="chat-container">
                    <div class="message-row bot">
                        <div class="avatar"><i class="fas fa-robot"></i></div>
                        <div class="bubble">Добро пожаловать! Я загружаю нейросеть (около 1.1 ГБ). Это займёт некоторое время. После загрузки я смогу отвечать на любые вопросы, а также вы можете создавать напоминания.</div>
                    </div>
                </div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
                        <button id="send-button" disabled><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            <div class="reminder-section">
                <h2><i class="fas fa-bell"></i> Напоминания</h2>
                <div class="reminder-form">
                    <input type="text" id="reminder-text" placeholder="Что напомнить?">
                    <input type="datetime-local" id="reminder-time">
                    <button id="add-reminder">Добавить напоминание</button>
                </div>
                <ul class="reminder-list" id="reminder-list"></ul>
            </div>
        </div>
        <div id="progress-bar" class="progress-bar" style="display: none;">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="loading-text"></div>
    </div>

    <script>
        (async function() {
            // Элементы
            const chatContainer = document.getElementById('chat-container');
            const inputField = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const loadingText = document.getElementById('loading-text');

            // Состояние
            let model = null;
            let tokenizer = null;
            let pipeline = null;
            let isGenerating = false;
            let conversationHistory = []; // для контекста

            // Приветственное сообщение (уже есть в HTML)

            // Функция добавления сообщения
            function addMessage(text, sender) {
                const row = document.createElement('div');
                row.className = `message-row ${sender}`;
                const avatar = document.createElement('div');
                avatar.className = `avatar ${sender}`;
                avatar.innerHTML = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;
                row.appendChild(avatar);
                row.appendChild(bubble);
                chatContainer.appendChild(row);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Индикатор печати
            function showTyping() {
                const row = document.createElement('div');
                row.className = 'message-row bot';
                row.id = 'typing-row';
                const avatar = document.createElement('div');
                avatar.className = 'avatar bot';
                avatar.innerHTML = '<i class="fas fa-robot"></i>';
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                row.appendChild(avatar);
                row.appendChild(indicator);
                chatContainer.appendChild(row);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function removeTyping() {
                const typing = document.getElementById('typing-row');
                if (typing) typing.remove();
            }

            // Обновление статуса загрузки
            function setLoading(progress, text) {
                if (progress > 0 && progress < 100) {
                    progressBar.style.display = 'block';
                    progressFill.style.width = progress + '%';
                } else if (progress === 100) {
                    progressBar.style.display = 'none';
                }
                loadingText.textContent = text || '';
                statusText.textContent = text || 'Загрузка...';
            }

            // Загрузка модели TinyLlama
            async function loadModel() {
                try {
                    statusDot.className = 'dot';
                    setLoading(0, 'Инициализация...');
                    
                    // Используем прогресс-колбэк
                    const progressCallback = (progress) => {
                        if (progress.status === 'progress' && progress.total) {
                            const percent = (progress.loaded / progress.total) * 100;
                            setLoading(percent, `Загрузка модели: ${Math.round(percent)}%`);
                        }
                    };

                    pipeline = await Transformers.pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                        quantized: true,
                        progress_callback: progressCallback,
                    });

                    model = pipeline.model;
                    tokenizer = pipeline.tokenizer;

                    setLoading(100, 'Готов!');
                    statusDot.classList.add('online');
                    statusText.textContent = 'Готов к работе';
                    inputField.disabled = false;
                    sendButton.disabled = false;
                    inputField.focus();
                    
                    addMessage('Модель загружена! Спрашивайте что угодно — от таблицы Менделеева до советов по метро. Также я могу создавать напоминания (справа).', 'bot');
                } catch (error) {
                    console.error(error);
                    setLoading(0, 'Ошибка загрузки модели. Проверьте интернет или обновите страницу.');
                    statusDot.style.background = '#ef4444';
                    statusText.textContent = 'Ошибка';
                }
            }

            // Генерация ответа
            async function generateResponse(userMessage) {
                if (isGenerating) return;
                isGenerating = true;
                sendButton.disabled = true;
                inputField.disabled = true;
                statusText.textContent = 'Думаю...';

                addMessage(userMessage, 'user');
                conversationHistory.push({ role: 'user', content: userMessage });

                // Формируем промпт для TinyLlama
                let prompt = '';
                for (const msg of conversationHistory.slice(-10)) { // последние 10 сообщений
                    if (msg.role === 'user') {
                        prompt += `<|user|>\n${msg.content}\n`;
                    } else {
                        prompt += `<|assistant|>\n${msg.content}\n`;
                    }
                }
                prompt += '<|assistant|>\n';

                showTyping();

                try {
                    const result = await pipeline(prompt, {
                        max_new_tokens: 200,
                        temperature: 0.7,
                        top_p: 0.9,
                        do_sample: true,
                        pad_token_id: tokenizer.eos_token_id,
                        eos_token_id: tokenizer.eos_token_id,
                    });

                    const fullText = result[0].generated_text;
                    const reply = fullText.split('<|assistant|>\n').pop().trim() || '...';

                    conversationHistory.push({ role: 'assistant', content: reply });
                    removeTyping();
                    addMessage(reply, 'bot');
                } catch (error) {
                    console.error(error);
                    removeTyping();
                    addMessage('Произошла ошибка при генерации. Попробуйте ещё раз.', 'bot');
                } finally {
                    isGenerating = false;
                    sendButton.disabled = false;
                    inputField.disabled = false;
                    statusText.textContent = 'Готов';
                    inputField.focus();
                }
            }

            // Обработчики
            sendButton.addEventListener('click', () => {
                const msg = inputField.value.trim();
                if (msg) {
                    inputField.value = '';
                    generateResponse(msg);
                }
            });

            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendButton.click();
                }
            });

            // Напоминания (как в предыдущей версии)
            let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');

            function saveReminders() {
                localStorage.setItem('reminders', JSON.stringify(reminders));
                renderReminders();
            }

            function renderReminders() {
                const list = document.getElementById('reminder-list');
                list.innerHTML = '';
                reminders.forEach((rem, index) => {
                    const li = document.createElement('li');
                    li.className = 'reminder-item';
                    li.innerHTML = `
                        <div class="reminder-info">
                            <span class="reminder-text">${rem.text}</span>
                            <span class="reminder-time">${new Date(rem.time).toLocaleString()}</span>
                        </div>
                        <div class="delete-reminder" onclick="deleteReminder(${index})"><i class="fas fa-times"></i></div>
                    `;
                    list.appendChild(li);
                });
            }

            window.deleteReminder = function(index) {
                reminders.splice(index, 1);
                saveReminders();
            };

            document.getElementById('add-reminder').addEventListener('click', () => {
                const text = document.getElementById('reminder-text').value.trim();
                const time = document.getElementById('reminder-time').value;
                if (!text || !time) {
                    alert('Введите текст и выберите время');
                    return;
                }
                const reminderTime = new Date(time).getTime();
                const now = Date.now();
                if (reminderTime <= now) {
                    alert('Время должно быть в будущем');
                    return;
                }
                reminders.push({ text, time: new Date(time).toISOString() });
                saveReminders();
                document.getElementById('reminder-text').value = '';
                document.getElementById('reminder-time').value = '';

                // Запрос разрешения на уведомления
                if (Notification.permission !== 'granted') {
                    Notification.requestPermission();
                }

                // Таймер
                setTimeout(() => {
                    if (Notification.permission === 'granted') {
                        new Notification('Напоминание', { body: text });
                    } else {
                        alert(`Напоминание: ${text}`);
                    }
                }, reminderTime - now);
            });

            renderReminders();
            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }

            // Старт загрузки модели
            loadModel();
        })();
    </script>
</body>
</html>
